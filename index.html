function normalizar(txt) {
  return (txt || '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .trim().toLowerCase().replace(/\s+/g, '-');
}

function chaveSubmissao(escola, grupamento, nomeAluno) {
  return normalizar(escola) + '::' + normalizar(grupamento) + '::' + normalizar(nomeAluno);
}

async function enviarRespostaParaSheets(payload) {
  const res = await fetch(GOOGLE_SHEETS_WEBAPP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error('Resposta HTTP ' + res.status);
  return res.json();
}

async function buscarRespostasDoSheets() {
  const res = await fetch(GOOGLE_SHEETS_WEBAPP_URL, { method: 'GET' });
  if (!res.ok) throw new Error('Resposta HTTP ' + res.status);
  const linhas = await res.json();
  return linhas.map(l => ({
    escolaOrigem: l.Escola_Origem,
    grupamento: l.Grupamento,
    nomeAluno: l.Aluno,
    responsavel: l.Responsavel,
    educacaoEspecial: l.Educacao_Especial,
    irmaoNaPrimeiraOpcao: l.Irmao_1a_Opcao,
    atualizadoEm: l.Atualizado_Em,
    escolhas: [1, 2, 3, 4, 5]
      .map(n => ({ prioridade: n, escolaDestino: l[n + 'a_Opcao'] }))
      .filter(e => e.escolaDestino),
  }));
}


function useEscolasOrigem() {
  return useMemo(() => {
    const set = new Set(REGRAS_CRE01.map(r => r.escolaOrigem));
    return Array.from(set).sort((a, b) => a.localeCompare(b, 'pt-BR'));
  }, []);
}

function useGrupamentos(escolaOrigem) {
  return useMemo(() => {
    if (!escolaOrigem) return [];
    const set = new Set(
      REGRAS_CRE01.filter(r => r.escolaOrigem === escolaOrigem).map(r => r.grupamento)
    );
    return Array.from(set).sort((a, b) => a.localeCompare(b, 'pt-BR'));
  }, [escolaOrigem]);
}

function useOpcoesDestino(escolaOrigem, grupamento) {
  return useMemo(() => {
    if (!escolaOrigem || !grupamento) return [];
    return REGRAS_CRE01
      .filter(r => r.escolaOrigem === escolaOrigem && r.grupamento === grupamento)
      .map(r => ({ ...r, vagasDisponiveis: r.capacidade - r.jaRemanejados }))
      .sort((a, b) => a.escolaDestino.localeCompare(b.escolaDestino, 'pt-BR'));
  }, [escolaOrigem, grupamento]);
}

function Formulario({ escolaTravada }) {
  const escolas = useEscolasOrigem();
  const [escolaOrigem, setEscolaOrigem] = useState(escolaTravada || '');
  const [grupamento, setGrupamento] = useState('');
  const grupamentos = useGrupamentos(escolaOrigem);
  const opcoes = useOpcoesDestino(escolaOrigem, grupamento);

  const [nomeAluno, setNomeAluno] = useState('');
  const [responsavel, setResponsavel] = useState('');
  const [educacaoEspecial, setEducacaoEspecial] = useState('');
  const [irmaoNaPrimeiraOpcao, setIrmaoNaPrimeiraOpcao] = useState('');
  const [ranks, setRanks] = useState({}); // { idRegra: rankNumber }
  const [status, setStatus] = useState('idle'); // idle | loading | saved | error
  const [erro, setErro] = useState('');
  const [jaExistiaSubmissao, setJaExistiaSubmissao] = useState(false);
  const [diagResultado, setDiagResultado] = useState(null);
  const [diagRodando, setDiagRodando] = useState(false);

  async function rodarDiagnostico() {
    setDiagRodando(true);
    const r = {};
    try {
      r.urlConfigurada = GOOGLE_SHEETS_WEBAPP_URL.includes('script.google.com') ? 'sim' : 'NÃO — URL não parece configurada';

      try {
        const respostaGet = await fetch(GOOGLE_SHEETS_WEBAPP_URL, { method: 'GET' });
        r.statusHttpGet = respostaGet.status;
        const corpo = await respostaGet.text();
        r.leituraPlanilha = respostaGet.ok ? ('ok (' + corpo.length + ' caracteres recebidos)') : ('ERRO: ' + corpo.slice(0, 200));
      } catch (e) {
        r.leituraPlanilha = 'ERRO ao conectar: ' + (e && e.message);
      }

      try {
        const testePayload = {
          escolaOrigem: '__teste_diagnostico__', grupamento: '__teste__', nomeAluno: '__teste__',
          responsavel: 'teste', educacaoEspecial: 'NAO', irmaoNaPrimeiraOpcao: 'NAO',
          atualizadoEm: new Date().toISOString(), escolhas: [],
        };
        const respostaPost = await enviarRespostaParaSheets(testePayload);
        r.escritaPlanilha = respostaPost && respostaPost.ok ? 'ok' : 'retornou: ' + JSON.stringify(respostaPost);
      } catch (e) {
        r.escritaPlanilha = 'ERRO ao gravar: ' + (e && e.message);
      }
    } catch (e) {
      r.erroGeral = e && e.message;
    }
    setDiagResultado(r);
    setDiagRodando(false);
  }


  // Carrega submissao existente quando o nome do aluno (com escola/turma) ja tiver sido usado antes
  useEffect(() => {
    let cancelado = false;
    async function carregar() {
      setJaExistiaSubmissao(false);
      setStatus('idle');
      if (!escolaOrigem || !grupamento || normalizar(nomeAluno).length < 3) return;
      try {
        const chaveAlvo = chaveSubmissao(escolaOrigem, grupamento, nomeAluno);
        const todas = await buscarRespostasDoSheets();
        if (cancelado) return;
        const dados = todas.find(s => chaveSubmissao(s.escolaOrigem, s.grupamento, s.nomeAluno) === chaveAlvo);
        if (!dados) return;
        const novoRanks = {};
        (dados.escolhas || []).forEach(e => {
          const opcao = opcoes.find(o => o.escolaDestino === e.escolaDestino);
          if (opcao) novoRanks[opcao.id] = e.prioridade;
        });
        setRanks(novoRanks);
        setResponsavel(dados.responsavel || '');
        setEducacaoEspecial(dados.educacaoEspecial === 'SIM' ? 'SIM' : (dados.educacaoEspecial === 'NAO' ? 'NAO' : ''));
        setIrmaoNaPrimeiraOpcao(dados.irmaoNaPrimeiraOpcao === 'SIM' ? 'SIM' : (dados.irmaoNaPrimeiraOpcao === 'NAO' ? 'NAO' : ''));
        setJaExistiaSubmissao(true);
      } catch (e) {
        // nao foi possivel checar (offline, etc) — segue com formulario em branco
      }
    }
    carregar();
    return () => { cancelado = true; };
  }, [escolaOrigem, grupamento, nomeAluno, opcoes]);

  // Limpa o formulario ao trocar escola ou turma
  useEffect(() => {
    setRanks({});
    setNomeAluno('');
    setResponsavel('');
    setEducacaoEspecial('');
    setIrmaoNaPrimeiraOpcao('');
    setJaExistiaSubmissao(false);
    setStatus('idle');
  }, [escolaOrigem, grupamento]);

  const handleSetRank = useCallback((idRegra, novoRank) => {
    setRanks(prev => {
      const next = { ...prev };
      if (novoRank === null) {
        delete next[idRegra];
        return next;
      }
      // remove o rank de quem tinha esse numero antes
      for (const key of Object.keys(next)) {
        if (next[key] === novoRank) delete next[key];
      }
      next[idRegra] = novoRank;
      return next;
    });
  }, []);

  const qtdSelecionadas = Object.keys(ranks).length;
  const podeSalvar = escolaOrigem && grupamento && normalizar(nomeAluno).length >= 3 &&
    responsavel.trim().length >= 3 && qtdSelecionadas >= 1 &&
    (educacaoEspecial === 'SIM' || educacaoEspecial === 'NAO') &&
    (irmaoNaPrimeiraOpcao === 'SIM' || irmaoNaPrimeiraOpcao === 'NAO');

  async function handleSalvar() {
    if (!podeSalvar) return;
    setStatus('loading');
    setErro('');
    try {
      const escolhas = Object.entries(ranks)
        .map(([idRegra, prioridade]) => {
          const opcao = opcoes.find(o => String(o.id) === String(idRegra));
          return {
            prioridade,
            idRegra: Number(idRegra),
            escolaDestino: opcao ? opcao.escolaDestino : '',
            bairroDestino: opcao ? opcao.bairroDestino : '',
            codEscolaDestino: opcao ? opcao.codEscolaDestino : '',
          };
        })
        .sort((a, b) => a.prioridade - b.prioridade);

      const payload = {
        escolaOrigem,
        grupamento,
        nomeAluno: nomeAluno.trim(),
        responsavel: responsavel.trim(),
        educacaoEspecial,
        irmaoNaPrimeiraOpcao,
        atualizadoEm: new Date().toISOString(),
        escolhas,
      };
      const resultado = await enviarRespostaParaSheets(payload);
      if (!resultado || !resultado.ok) throw new Error('Resposta inesperada da planilha');
      setStatus('saved');
      setJaExistiaSubmissao(true);
    } catch (e) {
      setStatus('error');
      setErro('Não foi possível salvar agora (' + (e && e.message ? e.message : 'erro desconhecido') + '). Tente novamente.');
    }
  }

  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'minmax(260px, 320px) 1fr', gap: 28, alignItems: 'flex-start' }}>
      <div
        style={{
          background: '#FFFFFF',
          border: '1px solid #DCE1E8',
          borderRadius: 12,
          padding: 20,
          position: 'sticky',
          top: 20,
          display: 'flex',
          flexDirection: 'column',
          gap: 16,
        }}
      >
        <div>
          <label style={{ fontSize: 11.5, fontWeight: 700, color: '#5B6B7C', letterSpacing: '0.03em', textTransform: 'uppercase' }}>
            Escola de origem
          </label>
          {escolaTravada ? (
            <div style={{
              marginTop: 6, padding: '9px 10px', fontSize: 13.5, fontWeight: 700,
              background: '#EAF1EF', border: '1px solid #A9D0C6', borderRadius: 7, color: '#0F5C52',
              display: 'flex', alignItems: 'center', gap: 8,
            }}>
              <Lock size={13} /> {escolaTravada}
            </div>
          ) : (
            <select
              value={escolaOrigem}
              onChange={e => { setEscolaOrigem(e.target.value); setGrupamento(''); }}
              style={selectStyle}
            >
              <option value="">Selecione a unidade…</option>
              {escolas.map(e => <option key={e} value={e}>{e}</option>)}
            </select>
          )}
        </div>

        <div>
          <label style={{ fontSize: 11.5, fontWeight: 700, color: '#5B6B7C', letterSpacing: '0.03em', textTransform: 'uppercase' }}>
            Turma / grupamento
          </label>
          <select
            value={grupamento}
            onChange={e => setGrupamento(e.target.value)}
            disabled={!escolaOrigem}
            style={{ ...selectStyle, opacity: escolaOrigem ? 1 : 0.5 }}
          >
            <option value="">{escolaOrigem ? 'Selecione a turma…' : 'Escolha a escola primeiro'}</option>
            {grupamentos.map(g => <option key={g} value={g}>{g}</option>)}
          </select>
        </div>

        <div>
          <label style={{ fontSize: 11.5, fontWeight: 700, color: '#5B6B7C', letterSpacing: '0.03em', textTransform: 'uppercase' }}>
            Nome do aluno
          </label>
          <input
            type="text"
            value={nomeAluno}
            onChange={e => setNomeAluno(e.target.value)}
            placeholder="Nome completo do aluno"
            style={selectStyle}
          />
        </div>

        <div>
          <label style={{ fontSize: 11.5, fontWeight: 700, color: '#5B6B7C', letterSpacing: '0.03em', textTransform: 'uppercase' }}>
            Responsável (pai, mãe ou responsável legal)
          </label>
          <input
            type="text"
            value={responsavel}
            onChange={e => setResponsavel(e.target.value)}
            placeholder="Nome de quem está preenchendo"
            style={selectStyle}
          />

          label="O aluno é público-alvo da Educação Especial?"
          value={educacaoEspecial}
          onChange={setEducacaoEspecial}

function csvEscape(v) {
  const s = String(v ?? '');
  if (/[;"\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function baixarCSV(submissoes) {
  const header = [
    'Escola_Origem', 'Grupamento', 'Nome_Aluno', 'Responsavel', 'Educacao_Especial', 'Irmao_1a_Opcao', 'Atualizado_Em',
    'Prioridade', 'ID_Regra', 'Escola_Destino', 'Cod_Escola_Destino', 'Bairro_Destino',
  ];
  const linhas = [header.join(';')];
  submissoes.forEach(s => {
    s.escolhas.forEach(e => {
      linhas.push([
        s.escolaOrigem, s.grupamento, s.nomeAluno, s.responsavel,
        s.educacaoEspecial === 'SIM' ? 'SIM' : 'NAO', s.irmaoNaPrimeiraOpcao === 'SIM' ? 'SIM' : 'NAO', s.atualizadoEm,
        e.prioridade, e.idRegra, e.escolaDestino, e.codEscolaDestino, e.bairroDestino,
      ].map(csvEscape).join(';'));
    });
  });
  const blob = new Blob(['\uFEFF' + linhas.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'consolidacao_remanejamento.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function baseLegalPrioridade(s) {
  const ee = s.educacaoEspecial === 'SIM';
  const irmao = s.irmaoNaPrimeiraOpcao === 'SIM';
  if (ee && irmao) {
    return "Lei Municipal nº 7.708/2022 (preferência para irmão na mesma unidade) + Art. 6º, §4º, 'b' da Resolução SME nº 542/2025 (Educação Especial, 15 pontos)";
  }
  if (irmao) {
    return 'Lei Municipal nº 7.708/2022, citada na Resolução SME nº 542/2025 — preferência de vaga para irmão(ã) na mesma unidade escolar';
  }
  if (ee) {
    return "Art. 6º, §4º, alínea 'b' da Resolução SME nº 542/2025 — critério classificatório de Educação Especial (15 pontos)";
  }
  return '';
}

function baixarXLSX(submissoes) {
  const linhasRespostas = submissoes.map(s => {
    const porPrioridade = {};
    (s.escolhas || []).forEach(e => { porPrioridade[e.prioridade] = e.escolaDestino; });
    return {
      Escola_Origem: s.escolaOrigem,
      Grupamento: s.grupamento,
      Aluno: s.nomeAluno,
      Responsavel: s.responsavel,
      Educacao_Especial: s.educacaoEspecial === 'SIM' ? 'SIM' : 'NÃO',
      Irmao_1a_Opcao: s.irmaoNaPrimeiraOpcao === 'SIM' ? 'SIM' : 'NÃO',
      '1ª opção': porPrioridade[1] || '',
      '2ª opção': porPrioridade[2] || '',
      '3ª opção': porPrioridade[3] || '',
      '4ª opção': porPrioridade[4] || '',
      '5ª opção': porPrioridade[5] || '',
      Atualizado_Em: s.atualizadoEm,
    };
  });

  const comparativo = submissoes
    .filter(s => s.educacaoEspecial === 'SIM' || s.irmaoNaPrimeiraOpcao === 'SIM')
    .map(s => {
      const primeira = (s.escolhas || []).find(e => e.prioridade === 1);
      return {
        Aluno: s.nomeAluno,
        Escola_Origem: s.escolaOrigem,
        Grupamento: s.grupamento,
        '1ª opção': primeira ? primeira.escolaDestino : '',
        Educacao_Especial: s.educacaoEspecial === 'SIM' ? 'SIM' : 'NÃO',
        Irmao_1a_Opcao: s.irmaoNaPrimeiraOpcao === 'SIM' ? 'SIM' : 'NÃO',
        Base_Legal: baseLegalPrioridade(s),
      };
    })
    .sort((a, b) => {
      const peso = r => (r.Educacao_Especial === 'SIM' ? 1 : 0) + (r.Irmao_1a_Opcao === 'SIM' ? 1 : 0);
      return peso(b) - peso(a);
    });

  const legenda = [
    { Item: 'Sobre esta planilha', Descricao: 'Gerada automaticamente a partir das respostas da pesquisa de preferência de remanejamento — CRE 01.' },
    { Item: 'Aba Respostas', Descricao: 'Todas as respostas recebidas, uma linha por aluno.' },
    { Item: 'Aba Comparativo_Prioridades', Descricao: 'Somente alunos com algum critério legal de prioridade assinalado, com a base jurídica de cada caso.' },
    { Item: 'Base legal — Educação Especial', Descricao: "Art. 6º, §4º, alínea 'b' da Resolução SME nº 542/2025 (15 pontos no critério classificatório)." },
    { Item: 'Base legal — Irmão na mesma unidade', Descricao: 'Lei Municipal nº 7.708/2022, citada nos considerandos da Resolução SME nº 542/2025.' },
    { Item: 'Importante', Descricao: 'Esta planilha é um apoio de organização e não substitui a análise oficial da CRE 01 sobre a alocação final de vagas.' },
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(linhasRespostas), 'Respostas');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(comparativo), 'Comparativo_Prioridades');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(legenda), 'Legenda');
  XLSX.writeFile(wb, 'consolidacao_remanejamento_cre01.xlsx');
}

function obterEscolaDaURL() {
  try {
    const params = new URLSearchParams(window.location.search);
    const bruto = params.get('escola');
    if (!bruto) return { param: null, escola: null };
    const alvo = normalizar(bruto);
    const escolas = Array.from(new Set(REGRAS_CRE01.map(r => r.escolaOrigem)));
    const encontrada = escolas.find(e => normalizar(e) === alvo);
    return { param: bruto, escola: encontrada || null };
  } catch (e) {
    return { param: null, escola: null };
  }
}

      <header style={{ background: '#FFFFFF', borderBottom: '1px solid #DCE1E8' }}>
        <div style={{ maxWidth: 1180, margin: '0 auto', padding: '22px 24px 0' }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#147D6F' }}>
                Pesquisa de preferência · CRE 01
              </div>
              <h1 style={{ fontFamily: 'Georgia, serif', fontSize: 26, margin: '4px 0 4px', color: '#16202B' }}>
                Remanejamento escolar: escolha da unidade de destino
              </h1>
              <p style={{ fontSize: 13.5, color: '#5B6B7C', margin: '0 0 10px', maxWidth: 660, lineHeight: 1.5 }}>
                Esta é uma pesquisa para conhecer a preferência das famílias. Indique, para o aluno, da 1ª à 5ª
                opção de escola entre as unidades da CRE 01 autorizadas a receber a turma. O preenchimento não
                garante a vaga na unidade escolhida — a decisão final cabe à Secretaria/CRE 01.
              </p>
              {escolaParam && !escolaTravada && (
                <p style={{ fontSize: 12.5, color: '#B8621B', margin: '0 0 10px', maxWidth: 660 }}>
                  O link informa a escola "{escolaParam}", mas ela não foi encontrada no cadastro. Selecione a
                  escola manualmente abaixo, ou avise a administração para conferir o link.
                </p>
              )}
            </div>
          </div>
          {view === 'formulario' && (
            <div style={{ display: 'flex', gap: 4 }}>
              <div
                style={{
                  display: 'flex', alignItems: 'center', gap: 7,
                  padding: '10px 16px',
                  borderBottom: '2px solid #21365B',
                  color: '#21365B',
                  fontWeight: 700,
                  fontSize: 13.5,
                }}
              >
                <ClipboardList size={15} /> Responder pesquisa
              </div>
            </div>
          )}
        </div>
      </header>

      <main style={{ maxWidth: 1180, margin: '0 auto', padding: '28px 24px 60px' }}>
        {view === 'formulario' && <Formulario escolaTravada={escolaTravada} />}
        {view === 'admin' && !adminDesbloqueado && (
          <PortaoAdministrador onDesbloquear={() => setAdminDesbloqueado(true)} />
        )}
        {view === 'admin' && adminDesbloqueado && <Consolidacao />}
      </main>

      <footer style={{ borderTop: '1px solid #DCE1E8', padding: '18px 24px', textAlign: 'center' }}>
        <button
          type="button"
          onClick={() => setView(view === 'admin' ? 'formulario' : 'admin')}
          style={{
            background: 'none', border: 'none', color: '#B3BCC6', fontSize: 11,
            cursor: 'pointer', textDecoration: 'underline', textUnderlineOffset: 3,
          }}
        >
          {view === 'admin' ? 'Voltar para a pesquisa' : 'Acesso da administração'}
        </button>
      </footer>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

</script>
</body>
</html>
